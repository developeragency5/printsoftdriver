name: Deploy PrintSoftDriver to GitHub Pages

# NOTE: Production traffic is served from Vercel at the custom domain
# (https://www.printsoftdriver.com). This workflow is kept around as a
# fallback only and no longer runs on push. Trigger it manually from the
# Actions tab if you need to publish a snapshot to GitHub Pages.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build PrintSoftDriver
        env:
          BASE_PATH: /printsoftdriver/
          PORT: 3000
        run: pnpm --filter @workspace/printsoftdriver run build

      - name: Add .nojekyll
        run: touch artifacts/printsoftdriver/dist/public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/printsoftdriver/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
