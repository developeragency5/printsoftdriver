name: Publish GitHub Pages redirect to custom domain

# Production traffic for PrintSoftDriver is served from Vercel at
# https://www.printsoftdriver.com. The legacy GitHub Pages site at
# https://developeragency5.github.io/printsoftdriver/ now publishes a tiny
# redirect-only shim instead of the full app, so any old bookmarks or
# backlinks land on the equivalent page on the canonical custom domain
# (preserving the path, query string, and hash).
#
# Runs on every push to main so the shim is kept in sync, and can also be
# triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build redirect shim
        run: |
          set -euo pipefail
          mkdir -p dist
          touch dist/.nojekyll

          # Single redirect document used for both the project root
          # (index.html) and every unknown path (404.html). The inline
          # script strips the legacy "/printsoftdriver" path prefix and
          # forwards to the same path on https://www.printsoftdriver.com,
          # preserving query string and hash. The <meta refresh> is the
          # no-JS fallback (Google treats a 0-second refresh as a 301).
          cat > dist/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Moved to printsoftdriver.com</title>
            <meta name="robots" content="noindex">
            <link rel="canonical" href="https://www.printsoftdriver.com/">
            <meta http-equiv="refresh" content="0; url=https://www.printsoftdriver.com/">
            <script>
              (function () {
                var target = 'https://www.printsoftdriver.com';
                var prefix = '/printsoftdriver';
                var path = window.location.pathname || '/';
                if (path.indexOf(prefix) === 0) {
                  path = path.substring(prefix.length);
                }
                if (path === '') {
                  path = '/';
                }
                window.location.replace(
                  target + path + window.location.search + window.location.hash
                );
              })();
            </script>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 4rem auto; padding: 0 1rem; color: #1f2937; }
              a { color: #0d9488; }
            </style>
          </head>
          <body>
            <h1>This site has moved</h1>
            <p>
              PrintSoftDriver now lives at
              <a href="https://www.printsoftdriver.com/">www.printsoftdriver.com</a>.
              You should be redirected automatically.
            </p>
          </body>
          </html>
          HTML

          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
