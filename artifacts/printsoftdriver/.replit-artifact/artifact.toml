kind = "web"
previewPath = "/"
title = "PrintSoftDriver"
version = "1.0.0"
id = "artifacts/printsoftdriver"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24123

[services.development]
run = "pnpm --filter @workspace/printsoftdriver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/printsoftdriver", "run", "build" ]
publicDir = "artifacts/printsoftdriver/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24123"
BASE_PATH = "/"
